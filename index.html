// Fuel gauge: visual position from efficient (left) to thirsty (right)
const FuelGauge = ({ value }) => {
  // Scale: 3 L/100km = far left (efficient), 13 L/100km = far right (thirsty)
  const min = 3, max = 13;
  const pct = Math.max(0, Math.min(100, ((value - min) / (max - min)) * 100));
  const color = value < 5 ? "#34d399" : value < 7 ? "#a3e635" : value < 9 ? "#facc15" : "#f87171";
  return (
    <div className="w-full">
      <div className="flex justify-between text-[8px] font-mono uppercase tracking-widest text-[#a3a3a3] mb-1.5">
        <span>Efficient</span>
        <span>Thirsty</span>

      <div className="relative h-1.5 bg-black/10 overflow-hidden" style={{ borderRadius: "1px" }}>
        <div className="absolute inset-y-0 left-0" style={{ width: "100%", background: "linear-gradient(90deg, #34d39922 0%, #a3e63522 33%, #facc1522 66%, #f8717122 100%)" }}></div>
        <div className="absolute top-0 bottom-0 w-0.5" style={{ left: `${pct}%`, background: color, boxShadow: `0 0 8px ${color}` }}></div>
      </div>
    </div>

};

// Region config
const REGIONS = {
  NZ: { label: "New Zealand", currency: "NZD", symbol: "$", fuel_price: 3.00, annual_km: 14000, flag: "🇳🇿" },
  AU: { label: "Australia", currency: "AUD", symbol: "$", fuel_price: 2.30, annual_km: 14000, flag: "🇦🇺" },
};

const calculateAnnualCost = (l_per_100km, region) => {
  const r = REGIONS[region];
  return (r.annual_km / 100) * l_per_100km * r.fuel_price;
};

const formatCurrency = (n, region) => {
  const r = REGIONS[region];
  return `${r.symbol}${Math.round(n).toLocaleString("en-NZ")}`;
};

// Helpers for cascading dropdowns
const getUniqueBrands = () => [...new Set(POPULAR_CARS.map(c => c.brand))].sort();
const getModelsForBrand = (brand) => [...new Set(POPULAR_CARS.filter(c => c.brand === brand).map(c => c.model))].sort();
const getYearsForBrandModel = (brand, model) => {
  const exact = POPULAR_CARS.filter(c => c.brand === brand && c.model === model).map(c => c.year);
  const baseYear = exact[0] || new Date().getFullYear();
  // Provide a reasonable range around the dataset year (consumption stable across same generation)
  const years = [];
  for (let y = baseYear + 2; y >= baseYear - 5; y--) years.push(y);
  return years;
};

// km/L = 100 / L per 100km
const calculateKmPerL = (l_per_100km) => (100 / l_per_100km).toFixed(2);

// Find alternatives in dataset
const findAlternatives = (car, dataset) => {
  return dataset
    .filter(c => 
      c.category === car.category && 
      c.l_per_100km < car.l_per_100km &&
      !(c.brand === car.brand && c.model === car.model)
    )
    .sort((a, b) => a.l_per_100km - b.l_per_100km)
    .slice(0, 3);
};

// AI lookup goes through /api/fuel-lookup serverless function
// The Gemini API key lives in Vercel env vars (GEMINI_API_KEY), never in this HTML

// AI fallback via our /api/fuel-lookup serverless function
async function fetchCarFromAI(brand, model, year) {
  const response = await fetch("/api/fuel-lookup", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ brand, model, year }),
  });

  if (!response.ok) {
    let errMsg = `Server error: ${response.status}`;
    try {
      const data = await response.json();
      if (data.error) errMsg = data.error;
    } catch {}
    throw new Error(errMsg);
  }

  return response.json();
}

// Find car in dataset (case-insensitive partial match)
function findInDataset(brand, model, year) {
  const b = brand.trim().toLowerCase();
  const m = model.trim().toLowerCase();
  const y = parseInt(year);
  
  return POPULAR_CARS.find(c => 
    c.brand.toLowerCase() === b &&
    (c.model.toLowerCase() === m || c.model.toLowerCase().includes(m) || m.includes(c.model.toLowerCase().split(" ")[0])) &&
    Math.abs(c.year - y) <= 1
  );
}

          {/* Metrics grid */}
          <div>
            <div className="text-[10px] font-mono uppercase tracking-[0.2em] mb-3" style={{ color: "rgba(255,255,255,0.6)" }}>Efficiency Metrics</div>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mb-5">
              <MetricBox label="L/100km" value={result.l_per_100km} unit="" />
              <MetricBox label="km/L" value={kmPerL} unit="" />
              <MetricBox label="L/km" value={lPerKm} unit="" />
            </div>
            <div className="text-[10px] font-mono uppercase tracking-[0.2em] mb-3" style={{ color: "rgba(255,255,255,0.6)" }}>Cost ({r.currency})</div>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
              <MetricBox label="Annual fuel" value={formatCurrency(annualCost, region)} unit="" highlight />
              <MetricBox label="Per month" value={formatCurrency(monthlyCost, region)} unit="" />
              <MetricBox label="Per day" value={formatCurrency(dailyCost, region)} unit="" />
            </div>
          </div>

          {/* Cost breakdown */}
          <div className="p-5" style={{ borderRadius: "2px", border: "1px solid rgba(255,255,255,0.12)" }}>
            <div className="flex items-center gap-2 mb-4">
              <Settings2 className="w-4 h-4" style={{ color: "#ffffff" }} />
              <h3 className="text-xs font-bold uppercase tracking-[0.2em]" style={{ color: "#ffffff" }}>Calculation Breakdown</h3>
            </div>
            <div className="space-y-2 text-sm font-mono">
              <CalcRow label="Annual distance" value={`${r.annual_km.toLocaleString("en-NZ")} km`} note={`${r.label} regional average`} />
              <CalcRow label="Fuel price" value={`${r.symbol}${r.fuel_price.toFixed(2)} ${r.currency}`} note="per litre, current average" />
              <CalcRow label="Consumption" value={`${result.l_per_100km} L/100km`} note="combined cycle" />
              <CalcRow label="Range per litre" value={`${kmPerL} km/L`} note={`100 ÷ ${result.l_per_100km}`} />
              <div className="pt-2 mt-2" style={{ borderTop: "1px solid rgba(255,255,255,0.12)" }}></div>
              <CalcRow label="Annual fuel cost" value={formatCurrency(annualCost, region)} note={`(${r.annual_km.toLocaleString("en-NZ")}/100) × ${result.l_per_100km} × ${r.symbol}${r.fuel_price.toFixed(2)}`} highlight />
              <CalcRow label="Per day" value={formatCurrency(dailyCost, region)} note={`across ${r.label}`} />
            </div>
          </div>

          {/* Alternatives */}
          {result.alternatives && result.alternatives.length > 0 && (
            <div>
              <div className="flex items-center gap-2 mb-4">
                <TrendingDown className="w-4 h-4" style={{ color: "#ffffff" }} />
                <h3 className="text-xs font-bold uppercase tracking-[0.2em]" style={{ color: "#ffffff" }}>More Efficient Alternatives</h3>
              </div>
              <div className="space-y-2">
                {result.alternatives.map((alt, i) => {
                  const altCost = calculateAnnualCost(alt.l_per_100km, region);
                  const saving = annualCost - altCost;
                  return (
                    <div key={i} className="flex items-center justify-between p-3 transition-colors" style={{ borderRadius: "2px", border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.03)" }}>
                      <div className="flex-1">
                        <div className="text-[10px] font-mono uppercase tracking-widest" style={{ color: "rgba(255,255,255,0.6)" }}>{alt.brand} · {alt.year}</div>
                        <div className="font-bold" style={{ fontFamily: "'Archivo', sans-serif", color: "#ffffff" }}>{alt.model}</div>
                      </div>
                      <div className="text-right">
                        <div className="font-mono text-sm" style={{ color: "#ffffff" }}>{alt.l_per_100km} L/100km</div>
                        <div className="text-[11px] font-mono font-bold" style={{ color: "#ffffff" }}>save {formatCurrency(saving, region)}/yr</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          <div className="text-[10px] font-mono uppercase tracking-widest text-center pt-4" style={{ color: "rgba(255,255,255,0.4)", borderTop: "1px solid rgba(255,255,255,0.12)" }}>
            Estimates based on combined cycle data · Actual usage varies with driving conditions
          </div>
        </div>
      </div>
    </div>
  );
}

function MetricBox({ label, value, unit, highlight }) {
  return (
    <div className="p-4" style={{ borderRadius: "2px", border: highlight ? "1px solid rgba(255,255,255,0.4)" : "1px solid rgba(255,255,255,0.15)", background: highlight ? "rgba(255,255,255,0.08)" : "rgba(255,255,255,0.03)" }}>
      <div className="text-[9px] font-mono uppercase tracking-widest mb-1" style={{ color: "rgba(255,255,255,0.6)" }}>{label}</div>
      <div className="text-2xl font-bold" style={{ fontFamily: "'JetBrains Mono', monospace", color: "#ffffff" }}>
        {value}{unit && <span className="text-xs ml-1" style={{ color: "rgba(255,255,255,0.6)" }}>{unit}</span>}
      </div>
    </div>
  );
}

function CalcRow({ label, value, note, highlight }) {
  return (
    <div className="flex justify-between items-baseline gap-4">
      <div className="flex-1">
        <div style={{ color: highlight ? "#ffffff" : "rgba(255,255,255,0.75)", fontWeight: highlight ? 700 : 400 }}>{label}</div>
        {note && <div className="text-[10px] font-sans" style={{ color: "rgba(255,255,255,0.4)" }}>{note}</div>}
      </div>
      <div style={{ color: "#ffffff", fontWeight: highlight ? 700 : 400, fontSize: highlight ? "16px" : "14px" }}>{value}</div>
    </div>
  );
}

function Select({ value, onChange, options, placeholder, disabled, mono }) {
  return (
    <div className="relative">
      <select
        value={value}
        onChange={(e) => onChange(e.target.value)}
        disabled={disabled}
        className={`w-full bg-white border border-[#e5e5e5] focus:border-[#ff6b1a] disabled:opacity-50 disabled:cursor-not-allowed px-4 py-3 pr-10 text-sm text-[#0a0a0b] outline-none transition-colors appearance-none cursor-pointer`}
        style={{ borderRadius: "2px", fontFamily: mono ? "'JetBrains Mono', monospace" : "'Manrope', sans-serif", color: value ? "#0a0a0b" : "#a3a3a3" }}
      >
        <option value="" disabled>{placeholder}</option>
        {options.map(opt => (
          <option key={opt} value={opt} style={{ color: "#0a0a0b", background: "#ffffff" }}>{opt}</option>
        ))}
      </select>
      <div className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-[#737373]">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2.5 4.5L6 8L9.5 4.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
    </div>
  );
}

function FuelApp() {
  const [region, setRegion] = useState("NZ");
  const [searchMode, setSearchMode] = useState("browse"); // "browse" | "search"
  const [selectedBrand, setSelectedBrand] = useState("");
  const [selectedModel, setSelectedModel] = useState("");
  const [selectedYear, setSelectedYear] = useState("");
  const [brand, setBrand] = useState("");
  const [model, setModel] = useState("");
  const [year, setYear] = useState("");
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  // Inject Google Fonts
  useEffect(() => {
    const link = document.createElement("link");
    link.href = "https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;600;700&display=swap";
    link.rel = "stylesheet";
    document.head.appendChild(link);
    return () => { try { document.head.removeChild(link); } catch(e) {} };
  }, []);

  const handleSearch = async () => {
    // Pull from active mode
    const useBrand = searchMode === "browse" ? selectedBrand : brand.trim();
    const useModel = searchMode === "browse" ? selectedModel : model.trim();
    const useYear = searchMode === "browse" ? selectedYear : (year.trim() || new Date().getFullYear());

    if (!useBrand || !useModel) {
      setError(searchMode === "browse" ? "Pick a brand and model" : "Enter both brand and model");
      return;
    }
    setError(null);
    setLoading(true);

    try {
      const fromDataset = findInDataset(useBrand, useModel, useYear);
      if (fromDataset) {
        const alts = findAlternatives(fromDataset, POPULAR_CARS);
        setResult({ ...fromDataset, year: parseInt(useYear) || fromDataset.year, alternatives: alts });
      } else {
        const aiResult = await fetchCarFromAI(useBrand, useModel, useYear);
        setResult(aiResult);
      }
    } catch (err) {
      console.error(err);
      setError(err.message || "Could not retrieve data. Try checking the spelling, or pick from popular cars below.");
    } finally {
      setLoading(false);
    }
  };

  const handleCarClick = (car) => {
    const alts = findAlternatives(car, POPULAR_CARS);
    setResult({ ...car, alternatives: alts });
  };

  return (
    <div className="min-h-screen bg-white text-[#0a0a0b]" style={{ fontFamily: "'Manrope', sans-serif" }}>
      {/* Top bar */}
      <header className="border-b border-[#e5e5e5] sticky top-0 z-40 bg-white/95 backdrop-blur-sm">
        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 flex items-center justify-center bg-[#ff6b1a] text-[#0a0a0b]" style={{ borderRadius: "2px" }}>
              <Fuel className="w-5 h-5" strokeWidth={2.5} />
            </div>
            <div>
              <h1 className="text-base font-black tracking-tight leading-none" style={{ fontFamily: "'Archivo', sans-serif" }}>
                NETFUEL
              </h1>
              <div className="text-[9px] font-mono uppercase tracking-[0.25em] text-[#737373] mt-0.5">
                NZ · AU Fuel Cost Analyser
              </div>
            </div>
          </div>

          <div className="flex items-center gap-2">
            {/* Region toggle */}
            <div className="flex border border-[#e5e5e5] p-0.5" style={{ borderRadius: "2px" }}>
              {Object.entries(REGIONS).map(([key, r]) => (
                <button
                  key={key}
                  onClick={() => setRegion(key)}
                  className={`px-3 py-1.5 text-xs font-bold tracking-widest uppercase transition-all flex items-center gap-1.5 ${
                    region === key ? "bg-[#ff6b1a] text-[#0a0a0b]" : "text-[#737373] hover:text-[#0a0a0b]"
                  }`}
                  style={{ borderRadius: "1px", fontFamily: "'JetBrains Mono', monospace" }}
                >
                  <span>{r.flag}</span>{key}
                </button>
              ))}
            </div>
          </div>
        </div>
      </header>

      {/* Hero search */}
      <section className="border-b border-[#e5e5e5]">
        <div className="max-w-7xl mx-auto px-6 py-12 md:py-16">
          <div className="max-w-3xl">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-8 h-px bg-[#ff6b1a]"></div>
              <span className="text-[10px] font-mono uppercase tracking-[0.3em] text-[#ff6b1a]">
                {REGIONS[region].symbol}{REGIONS[region].fuel_price.toFixed(2)} {REGIONS[region].currency}/L · {REGIONS[region].annual_km.toLocaleString("en-NZ")} km/yr
              </span>
            </div>
            <h2 className="text-5xl md:text-6xl font-black leading-[0.95] mb-3" style={{ fontFamily: "'Archivo', sans-serif", letterSpacing: "-0.03em" }}>
              How much does
              <br />
              <span className="text-[#ff6b1a]">your car drink?</span>
            </h2>
            <p className="text-base text-[#525252] max-w-xl">
              Real fuel consumption data and annual running costs for cars in {REGIONS[region].label}. Search any vehicle or browse popular models below.
            </p>
          </div>

          {/* Search form */}
          <div className="mt-10">
            <div className="flex items-center justify-between mb-3">
              <div className="text-[10px] font-mono uppercase tracking-[0.25em] text-[#737373]">
                {searchMode === "browse" ? "Pick a car" : "Search any vehicle"}
              </div>
              <button
                onClick={() => { setSearchMode(searchMode === "browse" ? "search" : "browse"); setError(null); }}
                className="text-[10px] font-mono uppercase tracking-widest text-[#ff6b1a] hover:text-[#ff8541] transition-colors flex items-center gap-1"
              >
                {searchMode === "browse" ? "Can't find your car? Search any →" : "← Back to browse"}
              </button>
            </div>

            {searchMode === "browse" ? (
              <div className="grid grid-cols-1 md:grid-cols-12 gap-2">
                <div className="md:col-span-3">
                  <label className="text-[10px] font-mono uppercase tracking-widest text-[#737373] block mb-2">Brand</label>
                  <Select
                    value={selectedBrand}
                    onChange={(v) => { setSelectedBrand(v); setSelectedModel(""); setSelectedYear(""); }}
                    placeholder="Select brand"
                    options={getUniqueBrands()}
                  />
                </div>
                <div className="md:col-span-4">
                  <label className="text-[10px] font-mono uppercase tracking-widest text-[#737373] block mb-2">Model</label>
                  <Select
                    value={selectedModel}
                    onChange={(v) => { setSelectedModel(v); setSelectedYear(""); }}
                    placeholder={selectedBrand ? "Select model" : "Pick a brand first"}
                    options={selectedBrand ? getModelsForBrand(selectedBrand) : []}
                    disabled={!selectedBrand}
                  />
                </div>
                <div className="md:col-span-2">
                  <label className="text-[10px] font-mono uppercase tracking-widest text-[#737373] block mb-2">Year</label>
                  <Select
                    value={selectedYear}
                    onChange={setSelectedYear}
                    placeholder={selectedModel ? "Year" : "—"}
                    options={selectedModel ? getYearsForBrandModel(selectedBrand, selectedModel) : []}
                    disabled={!selectedModel}
                    mono
                  />
                </div>
                <div className="md:col-span-3">
                  <label className="text-[10px] font-mono uppercase tracking-widest text-transparent block mb-2">.</label>
                  <button
                    type="button"
                    onClick={handleSearch}
                    disabled={loading || !selectedBrand || !selectedModel || !selectedYear}
                    className="w-full bg-[#ff6b1a] hover:bg-[#ff8541] disabled:bg-[#e5e5e5] disabled:text-[#a3a3a3] disabled:cursor-not-allowed text-[#0a0a0b] py-3 px-4 text-sm font-bold uppercase tracking-widest transition-colors flex items-center justify-center gap-2"
                    style={{ borderRadius: "2px", fontFamily: "'Archivo', sans-serif" }}
                  >
                    {loading ? <><Loader2 className="w-4 h-4 animate-spin" /> Analysing</> : <><Search className="w-4 h-4" /> Analyse</>}
                  </button>
                </div>
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-12 gap-2">
                <div className="md:col-span-3">
                  <label className="text-[10px] font-mono uppercase tracking-widest text-[#737373] block mb-2">Brand</label>
                  <input
                    type="text"
                    value={brand}
                    onChange={e => setBrand(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && handleSearch()}
                    placeholder="e.g. Tesla"
                    className="w-full bg-white border border-[#e5e5e5] focus:border-[#ff6b1a] px-4 py-3 text-sm text-[#0a0a0b] placeholder-[#a3a3a3] outline-none transition-colors"
                    style={{ borderRadius: "2px", fontFamily: "'Manrope', sans-serif" }}
                  />
                </div>
                <div className="md:col-span-4">
                  <label className="text-[10px] font-mono uppercase tracking-widest text-[#737373] block mb-2">Model</label>
                  <input
                    type="text"
                    value={model}
                    onChange={e => setModel(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && handleSearch()}
                    placeholder="e.g. Model 3"
                    className="w-full bg-white border border-[#e5e5e5] focus:border-[#ff6b1a] px-4 py-3 text-sm text-[#0a0a0b] placeholder-[#a3a3a3] outline-none transition-colors"
                    style={{ borderRadius: "2px" }}
                  />
                </div>
                <div className="md:col-span-2">
                  <label className="text-[10px] font-mono uppercase tracking-widest text-[#737373] block mb-2">Year</label>
                  <input
                    type="text"
                    value={year}
                    onChange={e => setYear(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && handleSearch()}
                    placeholder="2023"
                    inputMode="numeric"
                    className="w-full bg-white border border-[#e5e5e5] focus:border-[#ff6b1a] px-4 py-3 text-sm text-[#0a0a0b] placeholder-[#a3a3a3] outline-none transition-colors"
                    style={{ borderRadius: "2px", fontFamily: "'JetBrains Mono', monospace" }}
                  />
                </div>
                <div className="md:col-span-3">
                  <label className="text-[10px] font-mono uppercase tracking-widest text-transparent block mb-2">.</label>
                  <button
                    type="button"
                    onClick={handleSearch}
                    disabled={loading}
                    className="w-full bg-[#ff6b1a] hover:bg-[#ff8541] disabled:bg-[#d4d4d4] text-[#0a0a0b] py-3 px-4 text-sm font-bold uppercase tracking-widest transition-colors flex items-center justify-center gap-2"
                    style={{ borderRadius: "2px", fontFamily: "'Archivo', sans-serif" }}
                  >
                    {loading ? <><Loader2 className="w-4 h-4 animate-spin" /> Analysing</> : <><Search className="w-4 h-4" /> Analyse with AI</>}
                  </button>
                </div>
              </div>
            )}
            {error && <div className="mt-3 text-xs text-[#f87171] font-mono">{error}</div>}
          </div>
        </div>
      </section>

      {/* Popular cars */}
      <section className="max-w-7xl mx-auto px-6 py-12">
        <div className="mb-6">
          <div className="text-[10px] font-mono uppercase tracking-[0.3em] text-[#ff6b1a] mb-2">Trending in {region}</div>
          <h3 className="text-3xl font-black" style={{ fontFamily: "'Archivo', sans-serif", letterSpacing: "-0.02em" }}>
            Popular Cars
          </h3>
        </div>

        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {TOP_THREE.map((car, i) => (
            <CarCard key={`${car.brand}-${car.model}-${i}`} car={car} onClick={() => handleCarClick(car)} region={region} />
          ))}
        </div>
      </section>

      {/* Footer */}
      <footer className="border-t border-[#e5e5e5] mt-16">
        <div className="max-w-7xl mx-auto px-6 py-6 flex flex-wrap items-center justify-between gap-4 text-[10px] font-mono uppercase tracking-widest text-[#a3a3a3]">
          <div>NetFuel · Estimates based on combined cycle data</div>
          <div className="flex items-center gap-3">
            <span className="flex items-center gap-1.5"><MapPin className="w-3 h-3" /> {REGIONS[region].label}</span>
            <span className="flex items-center gap-1.5"><Calendar className="w-3 h-3" /> 26-04-2026</span>
          </div>
        </div>
      </footer>

      <ResultPanel result={result} region={region} onClose={() => setResult(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FuelApp />);
</script>
</body>
</html>
